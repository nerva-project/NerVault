<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <script>
        // Apply the saved (or OS-preferred) theme before first paint to avoid a flash.
        (function () {
            try {
                var s = localStorage.getItem("nerva-vault-theme");
                var t = s === "light" || s === "dark"
                    ? s
                    : window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
                        ? "light"
                        : "dark";
                document.documentElement.setAttribute("data-theme", t);
            } catch (e) { }
        })();
    </script>
    <link rel="icon" type="image/png" href="/nerva.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <title>NerVault · Nerva Web Wallet</title>
    <meta name="description"
        content="NerVault is a custodial web wallet for the Nerva (XNV) cryptocurrency — create or restore a wallet, check your balance, and send XNV from your browser." />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0d14" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f8fd" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NerVault" />
    <meta property="og:title" content="NerVault · Nerva Web Wallet" />
    <meta property="og:description"
        content="A custodial web wallet for the Nerva (XNV) cryptocurrency." />
    <meta property="og:image" content="/nerva.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NerVault · Nerva Web Wallet" />
    <meta name="twitter:description"
        content="A custodial web wallet for the Nerva (XNV) cryptocurrency." />
    <meta name="twitter:image" content="/nerva.png" />
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
</body>

</html>

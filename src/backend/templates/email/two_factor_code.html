<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eeeeee;
        }
        .header h1 {
            font-size: 24px;
            color: #5b9bd5;
            margin: 0;
        }
        .content {
            padding: 20px 0;
        }
        .content p {
            margin: 10px 0;
        }
        .code {
            text-align: center;
            margin: 20px 0;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #5b9bd5;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #aaaaaa;
            margin-top: 20px;
        }
    </style>
    <title></title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Your Login Code</h1>
        </div>
        <div class="content">
            <p>Hello there!</p>
            <p>Use the code below to finish signing in to your NerVault account. It expires in {{ ttl_minutes }} minutes.</p>
            <div class="code">{{ code }}</div>
            <p>If you did not try to sign in, someone else may know your password. Please change it as soon as possible.</p>
        </div>
        <div class="footer">
            <p>Kind regards,<br>The NerVault Team</p>
        </div>
    </div>
</body>
</html>
